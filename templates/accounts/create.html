{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block Content %}
<div class='row'>
	<div class='col-md-12'>
		<div class='card'>
			<div class='card-header'>
				<div class='card-body'>
				<div class='h6'>Formulaire d'ajout d'utilisateur </div>
				<hr>
				<form  enctype='multipart/form-data' method='post'>
					{{ form|crispy }}
					{% csrf_token %}
					<div class='col-md-2'>
						<button class='btn btn-primary' type='submit'>Valider</button>
						
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
{% endblock %}
