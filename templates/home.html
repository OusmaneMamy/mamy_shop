{% block Script %}
<script>
    var options = {
        series: [44, 55, 13, 43, 22],
        chart: {
        width: 380,
        type: 'pie',
      },
      labels: ['Team A', 'Team B', 'Team C', 'Team D', 'Team E'],
      responsive: [{
        breakpoint: 480,
        options: {
          chart: {
            width: 200
          },
          legend: {
            position: 'bottom'
          }
        }
      }]
      }; 
      var chart = new ApexCharts(document.querySelector("#chart"), options);
      chart.render();   
</script>

<script>

      }],

      },

      },

      },

        width: 2,
        colors: ['transparent']
      },

      },
      yaxis: {
        title: {
          text: '$ (thousands)'
        }

      },
      tooltip: {
        y: {
          formatter: function (val) {
            return "$ " + val + " thousands"
          }
        }
      }
      };
      var chart = new ApexCharts(document.querySelector("#bar"), options);
      chart.render();
</script>

<script> 
    var options = {
        series: [{
        name: 'PRODUCT A',
        data: 1
      }, {
        name: 'PRODUCT B',
        data: 2
      }, {
        name: 'PRODUCT C',
        data: 3
      }],
        chart: {
        type: 'area',
        stacked: false,
        height: 350,
        zoom: {
          enabled: false
        },
      },
      dataLabels: {
        enabled: false
      },
      markers: {
        size: 0,
      },
      fill: {
        type: 'gradient',
        gradient: {
            shadeIntensity: 1,
            inverseColors: false,
            opacityFrom: 0.45,
            opacityTo: 0.05,
            stops: [20, 100, 100, 100]
          },
      },
      yaxis: {
        labels: {
            style: {
                colors: '#8e8da4',
            },
            offsetX: 0,
            formatter: function(val) {
              return (val / 1000000).toFixed(2);
            },
        },
        axisBorder: {
            show: false,
        },
        axisTicks: {
            show: false
        }
      },
      xaxis: {
        type: 'datetime',
        tickAmount: 8,
        min: new Date("01/01/2014").getTime(),
        max: new Date("01/20/2014").getTime(),
        labels: {
            rotate: -15,
            rotateAlways: true,
            formatter: function(val, timestamp) {
              return moment(new Date(timestamp)).format("DD MMM YYYY")
          }
        }
      },
      title: {
        text: 'Irregular Data in Time Series',
        align: 'left',
        offsetX: 14
      },
      tooltip: {
        shared: true
      },
      legend: {
        position: 'top',
        horizontalAlign: 'right',
        offsetX: -10
      }
      };
      var chart = new ApexCharts(document.querySelector("#courbe"), options);
      chart.render();
</script>
