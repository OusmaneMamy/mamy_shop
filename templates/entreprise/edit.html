{% extends 'base.html' %} 
{% load crispy_forms_tags %}

{% block Content %}
<div class="row">
  <div class="col-md-12">
    <div class="card">
      <div class="card-header text-dark">
        
      </div>
      <div class="card-body">
        <h5 class="card-title">Formulaire de modification des informations de l'entreprise</h5>
        <hr>
        <form action="" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn btn-primary" type="submit" >Modifier</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock Content %}
